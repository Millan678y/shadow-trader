name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: echo "${{ secrets.VERCEL_TOKEN }}" | vercel pull --yes --environment=production

      - name: Build project
        run: echo "${{ secrets.VERCEL_TOKEN }}" | vercel build --prod

      - name: Deploy to Vercel
        run: echo "${{ secrets.VERCEL_TOKEN }}" | vercel deploy --prebuilt --prod